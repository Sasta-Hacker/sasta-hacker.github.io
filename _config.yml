# The Site Configuration

theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Kolkata

# SEO Settings
title: Sasta Hacker
tagline: TryHackMe, HackTheBox & CTF Writeups
description: >-
  A collection of CTF writeups and cybersecurity notes by Sasta Hacker.

url: "https://sasta-hacker.github.io"

github:
  username: Sasta-Hacker

twitter:
  username: Sasta0Hacker

social:
  name: Sasta Hacker
  email: sasta@hacker.com
  links:
    - https://github.com/Sasta-Hacker
    - https://twitter.com/Sasta0Hacker
    - https://tryhackme.com/p/Sasta0Hacker
    - https://app.hackthebox.com/profile/2397481

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

theme_mode:  # can be "light", "dark", or leave blank for auto

cdn:

avatar:  # optional: e.g. "/assets/img/avatar.png"

social_preview_image:  # optional: e.g. "/assets/img/social-preview.png"

toc: true

comments:
  provider:  # e.g. "giscus"
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10
baseurl: ""

# Don't edit below unless you're sure

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
